# Config: Jurkats DZNep timecourse -- grid plots (combined, laminB only, bTub only)
#
# Generates a standalone PPTX with violin-plot grid images for 3 datasets x 5 metrics.
# Two template slides:
#   template_slide 0: layout for timecourse (Treatment_Timecourses) slides
#   template_slide 1: layout for adjacent-timepoint (Timepoint_Comparisons) slides
#
# Each slide has 2 images stacked vertically:
#   TOP:    full timecourse (4, 8, 15, 30 min, 1 hr)
#   BOTTOM: without 15 min timepoint
#
# Slide title formula: {Metric}: {Comparison} ({Dataset})
#   Comparison labels:
#     Treatment_Timecourses pair    -> "Ctrl and DZNep at adjacent timepoints"
#     Timepoint_Comparisons pair   -> "Ctrl vs DZNep"
#   Dataset labels:
#     combined -> "lamin B and bTub combined"
#     lmnb1    -> "lamin B only"
#     bTub     -> "bTub only"
#
# Ordering: Metric -> Dataset -> Comparison (30 slides: 5 x 3 x 2)
# Metrics (in order): nuc_deform_ratio_major_m, nuc_centroid_z,
#   nuc_centroid_z_bottom_ce, invag_ratio, actin_bottom_mask_area
# Display names:
#   nuc_deform_ratio_major_m    -> "Nuclear aspect ratio"
#   nuc_centroid_z              -> "Nuclear centroid z-position relative to bottom plane of imaging"
#   nuc_centroid_z_bottom_ce    -> "Nuclear centroid z-position relative to cell bottom"
#   invag_ratio                 -> "Nuclear invagination ratio"
#   actin_bottom_mask_area      -> "Area at synapse"

